name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm install

      - run: npm run lint

      - run: npx vitest run --coverage --reporter=default --reporter=json --outputFile=test-results.json

      - run: npm run build

      # Packaging validation — green CI ⟹ publishable. Catches missing dist,
      # wrong exports, bad files globs at PR time, not at the irreversible step.
      - run: npm publish --dry-run --access public

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage-final.json
          fail_ci_if_error: false
