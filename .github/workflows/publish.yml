name: Release & Publish

# Manually triggered release for @fyre-db/core.
# You provide the version + release notes; this workflow validates, bumps
# package.json on main, tags, publishes to npm (with provenance), and creates
# the GitHub Release — all with the correct version in every place.
#
# Requirements:
#   - Runs only from `main`.
#   - secrets.RELEASE_TOKEN: a GitHub App installation token (or fine-grained
#     PAT) allowed to push to `main` via a branch-protection bypass. The default
#     GITHUB_TOKEN cannot push to a protected branch.
#   - npm Trusted Publishing (OIDC) configured for @fyre-db/core (no npm token).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0 — no leading v)"
        required: true
        type: string
      notes:
        description: "Release notes (markdown)"
        required: false
        type: string

permissions:
  id-token: write # OIDC for npm provenance
  contents: write # create tag + GitHub Release (push uses RELEASE_TOKEN)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Hard guard: only ever release from main.
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Validate version input
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::'$VERSION' is not a valid semver version (expected e.g. 0.1.0)."
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm install

      - name: Guard — version not already published
        run: |
          NAME=$(node -p "require('./package.json').name")
          PUBLISHED=$(npm view "${NAME}@${VERSION}" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "::error::${NAME}@${VERSION} is already published to npm."
            exit 1
          fi

      - name: Guard — git tag does not already exist
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists."
            exit 1
          fi

      # Full validation before any irreversible step.
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npm publish --dry-run --access public

      - name: Bump version on main
        run: |
          npm version "$VERSION" --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json 2>/dev/null || git add package.json
          git commit -m "chore(release): v${VERSION}"
          git push origin main

      - name: Tag the release commit
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="${{ inputs.notes }}"
          if [ -z "$NOTES" ]; then NOTES="Release v${VERSION}"; fi
          gh release create "v${VERSION}" \
            --target main \
            --title "v${VERSION}" \
            --notes "$NOTES"

